<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interceptor Walkthrough</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090d;
      --panel: #101722;
      --text: #f5f7fb;
      --muted: #9ca8b8;
      --accent: #63e6be;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(99, 230, 190, 0.2), transparent 30rem),
        radial-gradient(circle at 80% 0%, rgba(95, 165, 255, 0.18), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      width: min(1100px, 100%);
    }

    a {
      color: var(--accent);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4.6rem);
      line-height: 0.95;
      margin: 0 0 18px;
    }

    p {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.6;
      max-width: 760px;
      margin: 0 0 24px;
    }

    .video-frame {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      box-shadow: 0 32px 100px rgba(0, 0, 0, 0.45);
      padding: 12px;
    }

    video {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
      background: #000;
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Interceptor Walkthrough</p>
    <h1>Real browser control for AI agents.</h1>
    <p>
      This walkthrough shows the CLI flow and live browser overlays working together in the same session.
    </p>
    <div class="video-frame">
      <video controls preload="metadata" poster="assets/interceptor-demo-preview.jpg">
        <source src="assets/interceptor-walkthrough-720p.mp4" type="video/mp4">
        <a href="assets/interceptor-walkthrough-720p.mp4">Download the walkthrough video.</a>
      </video>
    </div>
    <p class="footer">
      <a href="https://github.com/Hacker-Valley-Media/Interceptor">Back to the Interceptor repository</a>
    </p>
  </main>
</body>
</html>
